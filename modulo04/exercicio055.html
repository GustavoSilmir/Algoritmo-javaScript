<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 55</title>
</head>
<body>
    <h1>Exercício 55</h1>
    <button onclick="verificarVetor()">Verificar Vetor</button>
    <div id="resultado"></div>
    <script>
        function verificarVetor(){
           let res = document.getElementById("resultado");
           res.innerHTML = "";
           let inicioVetor = Number(prompt('Qual número vamos iniciar: '))
           let vetor = []
           vetor[0] = inicioVetor
           for(let pos = 1; pos <= 10;pos++){
                vetor[pos] = vetor[pos - 1] * 2;
           }
           for(let pos = 0; pos < 10; pos++){
                res.innerHTML += `Posição [${pos}] = <strong>${vetor[pos]}</strong><br>`
           }

        }
    </script>
</body>
</html>
