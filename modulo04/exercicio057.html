<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 57</title>
</head>
<body>
    <h1>Exercício 57</h1>
    <button onclick="verificarVetor()">Calcular vetor</button>
    <div id="resultado"></div>
    <script>
        function verificarVetor(){
            let res = document.getElementById("resultado");
           res.innerHTML = "";
          
           let vetor = []
           for(let pos = 0; pos < 10;pos++){
                vetor[pos] = Math.floor(Math.random() * 10) + 1;
           }
           for(let pos = 0; pos < 10; pos++){
                res.innerHTML += `Posição [${pos + 1}] = <strong>${vetor[pos]}</strong><br>`
           }
           res.innerHTML += "<br><hr><br>";

            // 3. Mostrando na ORDEM INVERSA
            res.innerHTML += "<h3>Ordem Inversa:</h3>";
           for(let pos = 9; pos >= 0; pos--){

                res.innerHTML += `Posição [${pos + 1}] = <strong>${vetor[pos]}</strong><br>`
           }
        }
    </script>
</body>
</html>
