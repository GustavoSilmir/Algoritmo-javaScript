<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 58</title>
</head>
<body>
    <h1>Exercício 58</h1>
    <button onclick="gerarFibonacci()">Fibonacci</button>
    <div id="resultado"></div>
    <script>
        function gerarFibonacci(){
            let res = document.getElementById("resultado")
            res.innerHTML = "";
            

            let fib = []
            fib[0] = 0;
            fib[1] = 1;
            for(let pos = 2; pos < 10; pos++){
                fib[pos] = fib[pos - 1] + fib[pos - 2];
            }

            res.innerHTML += "<h3>Os 10 primeiros termos de Fibonacci:</h3>";
            for(let pos = 0; pos < 10; pos++){
                res.innerHTML += `Termo ${pos + 1}: <strong>${fib[pos]}</strong><br>`;
            }

        }
    </script>

</body>
</html>
