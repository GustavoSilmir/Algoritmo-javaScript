<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício020</title>
</head>
<body>
    <h1>Exercício 020</h1>
    <h2>Cinema</h2>
    <h3>O filme inicia ás <span id="ano"></span></h3>
    <h4>Valor do ingresso é R$ 20,00</h4>
    <span>Quanto dinheiro você possui?R$<input type="number" id="valor"></span><button onclick="calculoCinema()">Verificar Filme</button>
    <div id="resultado"></div>
    <script>
         const agora = new Date()
        const hora = agora.getHours()
        document.getElementById("ano").innerHTML = hora
        function calculoCinema(){
           const agora = new Date()
        const hora = agora.getHours()
        
        let txtn1 = document.getElementById("valor")
        let valorCinema = Number(txtn1.value)
        let res = document.getElementById("resultado")
        if(valorCinema < 20 || hora != 18 ){
            res.innerHTML = `Com o valor de ${valorCinema.toLocaleString('pt-br', {style:'currency', currency: 'BRL'})} Não é possível entrar no cinema`
        }else{
            res.innerHTML = `Bem vindo ao cinema Silmir`
        }
    }

    </script>
</body>
</html>
