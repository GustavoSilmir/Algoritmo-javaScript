<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 005</title>
</head>
<body>
    <h1>Exercício 005</h1>
    <span><input type="number" id="num1" placeholder="Digite a primeira nota"></span>
    <span><input type="number" id="num2" placeholder="Digite a segunda nota"></span>
    <button onclick="calcularMedia()">Calculo de Média</button>
    <div id="resultado"></div>
    <script>
        function calcularMedia(){
            let txtn1 = document.getElementById("num1")
            let txtn2 = document.getElementById("num2")
            let n1 = Number(txtn1.value)
            let n2 = Number(txtn2.value)
            if(txtn1.value.length == 0 || txtn2.value.length == 0){
                alert("Preencha os campos corretamente");
                return;
            }

            media = (n1 + n2)/ 2
            let res = document.getElementById("resultado");
            res.innerHTML = `As notas do aluno foram ${n1.toFixed(1)} e ${n2.toFixed(1)} <br>`;
            res.innerHTML += `A média final foi ${media}`
        }
    </script>
</body>
</html>
