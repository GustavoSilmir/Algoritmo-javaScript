<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 007</title>
</head>
<body>
    <h1>Exercício 007</h1>
    <span><input type="number" id="larg" placeholder="Largura da Parede">Largura da Parede</span><br><br>
    <span><input type="number" id="alt" placeholder="Altura da Parede">Altura da Parede</span><br><br>
    <button onclick="calculoParede()">Calcular Latas de Tinta</button><br>
    <div id="resultado"></div>
    <script>
        function calculoParede() {
            let txtn1 = document.getElementById("larg")
            let txtn2 = document.getElementById("alt")
            let largura = Number(txtn1.value)
            let altura = Number(txtn2.value)
            let area = largura * altura
            let latas = area / 2
            let res = document.getElementById("resultado")
            res.innerHTML = `Uma parede de ${largura} x ${altura} tem uma area de ${area} m² <br>`
            res.innerHTML += `Será necessário ${latas} latas de tintas para pintar tudo`
        }
    </script>

</body>
</html>
