<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício018</title>
</head>
<body>
    <h1>Exercício 018</h1>
    <h2>Viagens Silmir</h2>
    <span>Digite a distância em KM da sua viagem <input type="number" id="valor">KM</span><br><br>
    <button onclick="calculoViagem()">Calcular Viagem</button><br><br>
    <div id="resultado"></div>
    <script>
        function calculoViagem(){
            let txtn1 = document.getElementById("valor")
            let calculo = Number(txtn1.value)
            let res = document.getElementById("resultado")
            if(calculo < 150){
                let valorPassagem = calculo * 0.50
                res.innerHTML = `A sua viagem tem uma distância de ${calculo}km. Sua viagem terá um valor de ${valorPassagem.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'})}`
            }else{
                let valorPassagem = calculo * 0.35
                res.innerHTML = `A sua viagem tem uma distância de ${calculo}km. Sua viagem terá um valor de ${valorPassagem.toLocaleString('pt-br', {style:'currency', currency: 'BRL'})}`
            }
            
        }
    </script>
</body>
</html>
