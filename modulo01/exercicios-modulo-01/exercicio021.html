<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=[device-width], initial-scale=1.0">
    <title>Exercício 021</title>
</head>
<body>
    <h1>Exercício 021</h1>
    <h2>Número positivo ou negativo</h2>
    <span>Digite um número qualquer <input type="number" id="valor"></span><button onclick="verificarNumero()">Verificar valor </button>
    <div id="resultado"></div>
    <script>
        function verificarNumero(){
            let txtn1 = document.getElementById("valor")
            if(txtn1.value.length == ""){
                alert("Digite um valor")
            }
            let res = document.getElementById("resultado")
            let valor = Number(txtn1.value)
            if(valor > 0){
                res.innerHTML = `o valor digitado ${valor} é positivo`
            }else if(valor < 0){
                res.innerHTML = `o valor digitado ${valor} é negativo`
            }else{
                res.innerHTML = `O valor é ZERO`
            }
        }
    </script>
</body>
</html>
