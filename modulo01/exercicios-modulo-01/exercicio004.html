<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 004</title>
</head>
<body>
    <h1>Exercício 003 - Operações Aritméticas</h1>
    <span><input type="number" id="num1" placeholder="Digite um número"></span>
    <span><input type="number" id="num2" placeholder="Digite um número"></span>
    <button onclick="calcularoperacoes()">Calculo</button>
    <div id="resultado"></div>
    <script>
        function calcularoperacoes(){
            let txtn1 = document.getElementById('num1')
            let txtn2 = document.getElementById('num2')
            let n1 = Number(txtn1.value)
            let n2 = Number(txtn2.value)
            if(txtn1.value.length == 0 || txtn2.value.length == 0 ){
                alert('Preencha corretamente os campos')
                return;
            }
            let soma = n1 + n2;
            let sub = n1 - n2;
            let mult = n1 * n2;
            let divisao = n1 / n2;
            let resto = n1 % n2;
            let divinteira = Math.floor(n1/n2)
            let res = document.getElementById('resultado');
            res.innerHTML = "RESULTADO....<br>"
            res.innerHTML += `SOMA = ${soma}<br>`;
            res.innerHTML += `DIFERENÇA = ${sub}<br>`;
            res.innerHTML += `PRODUTO = ${mult}<br>`;
            res.innerHTML += `DIVISÃO INTEIRA = ${divinteira}<br>`;
            res.innerHTML += `DIVISÃO REAL = ${divisao}<br>`;
            res.innerHTML += `RESTO DA DIVISÃO = ${resto}`;

        }
    </script>
</body>
</html>
