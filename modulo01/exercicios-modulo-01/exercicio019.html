<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 019</title>
</head>
<body>
    <h1>Exercício 019</h1>
    <span>Digite um valor <input type="number" id="valor"></span><button onclick="calculoNumero()">Calculo</button>
    <div id="resultado"></div>

    <script>
        function calculoNumero(){
            let res = document.getElementById("resultado")
            let txtn1 = document.getElementById("valor")
            let valor = Number(txtn1.value)
            if(valor < 0){
                let inverso = valor * -1
                res.innerHTML = `o oposto do valor ${valor} é ${inverso}`
            }else{
                let oposto = 1 / valor
                res.innerHTML = `O inverso do valor ${valor} é ${oposto}`
            }
        }
    </script>
</body>
</html>
