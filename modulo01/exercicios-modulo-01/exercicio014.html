<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício014</title>
</head>
<body>
    <h1>Exercício 014</h1>
    <span>Quanto o cliente gastou em nossa loja?</span><br>
    <span>Valor R$:<input type="number" id="valor"></span><button onclick="verificarDesconto()">Verificar Desconto</button>
    <div id="resultado"></div>
    <script>
       function verificarDesconto(){
        let txtn1 = document.getElementById("valor")
        
        let valor = Number(txtn1.value)
        if(txtn1.value.length == 0 || valor <= 0){
            alert("Digite um valor.")
            return
        }
        let res = document.getElementById("resultado")
        res.innerHTML = ""
        res.innerHTML += `Sua compra foi no valor de ${valor.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'})}`
        if(valor > 500){
            let desconto = valor - (valor * 0.10)
            res.innerHTML += `<br>Como sua compra ultrapassa o valor de R$ 500,00 
            Você irá ganhar um desconto de 10%.<br>` 
            res.innerHTML += `O total a ser pago sera de ${desconto.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'})}`
        }
       }
    </script>
</body>
</html>
