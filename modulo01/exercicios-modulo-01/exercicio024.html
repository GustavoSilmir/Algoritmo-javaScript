<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 24</title>
</head>
<body>
    <h1>Exercício 24</h1>
    <h2>Descobrindo sua naturalidade</h2>
    <span>Digite seu Estado <input type="text" id="estado"></span><br><br>
    <button onclick="verificarNaturalidade()">Verificar Naturalidade</button>
    <div id="resultado"></div>
    <script>
        function verificarNaturalidade(){
           let estado = document.getElementById("estado").value
           let res = document.getElementById("resultado")
           res.innerHTML = `O seu estado é ${estado}<br>`
           if(estado == 'São Paulo' || estado == 'Sao Paulo' || estado == 'sp' || estado == 'SP'){
            res.innerHTML += `Você é Paulista`
           }else if(estado == 'Rio de Janeiro' || estado == 'rio de janeiro' || estado == 'rj' || estado == 'RJ'){
            res.innerHTML += `Você é Carioca`
           }else if(estado == 'Sc' || estado == 'sc' || estado == 'santa catarina'){
            res.innerHTML += `Você é catarinense`
           }
        
        }
    </script>
</body>
</html>
