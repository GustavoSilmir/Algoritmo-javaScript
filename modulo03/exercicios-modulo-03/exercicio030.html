<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 30</title>
</head>
<body>
    <h1>Exercício 30</h1>
    <span>Quer contar até quanto? <input type="number" id="valor">
        <button onclick="analisarPim()">Verificar</button>
        <div id="resultado"></div>
        <script>
            function analisarPim(){
                let txtn1 = document.getElementById("valor")
                let res = document.getElementById("resultado")
                let valor = Number(txtn1.value)
                let inicio = 1;
                while(inicio <= valor){
                     if(inicio % 4 == 0){
                        res.innerHTML += `PIM - <br>`
                    }else{
                        res.innerHTML += `${inicio} -`
                    }
                    
                   
                        inicio++
                }
            }
        </script>
    </span>
</body>
</html>
