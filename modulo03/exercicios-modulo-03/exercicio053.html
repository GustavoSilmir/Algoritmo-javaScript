<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 53</title>
</head>
<body>
    <h1>Exercício 53</h1>
    <h2>Numeros entre 1 e 10, exibir total digitado e soma de todos os valores digitados</h2>
    <button onclick="validarNumeros()">Vamos validar números</button>
    <div id="resultado"></div>
    <script>
        function validarNumeros(){
            let res = document.getElementById("resultado")            
            let total = 0;
            let soma = 0;
            let resp = '';
            let num = 0;
            do{
                while(true){
                     num = Number(prompt("Digite um número entre 1 e 10: "))
                    if(num >= 1 && num <= 10){
                        res.innerHTML += `<br> Número digitado: <strong>${num}</strong>`
                        break
                    }else{
                        alert("O número deve estar entre 1 e 10.")
                    }
                }
                total++
                soma += num
            while(true){
                resp = prompt("Deseja Continuar?[S/N] ").toLocaleLowerCase().trim();
                if (resp == 's' || resp == 'n' || resp == 'sim' || resp == 'não' || resp == 'nao') {
                        break; // Resposta válida recebida, quebra o while interno
                    } else {
                        alert("Por favor, responda apenas com S ou N.");
                    }

            }
            }while(resp == 's' || resp == 'sim')

            res.innerHTML += `<br> O total de números digitados foi de ${total}.`;
            res.innerHTML += `<br>A soma dos valores digitados é de ${soma}`


        }
    </script>
</body>
</html>
