<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 29</title>
</head>
<body>
    <h1>Exercício 29</h1>
    <span>Onde começa a contagem? <input type="number" id="inicio"></span><br><br>
    <span>Onde termina a contagem? <input type="number" id="termina"></span><br><br>
    <span>Qual vai ser o incremento? <input type="number" id="incremento"></span><br><br>
    <button onclick="verificarValores()">Analisar</button>
    <div id="resultado"></div>
    <script>
        function verificarValores(){
            let txtn1 = document.getElementById("inicio");
            let txtn2 = document.getElementById("termina");
            let txtn3 = document.getElementById("incremento");
            let inicio = Number(txtn1.value);
            let termina = Number(txtn2.value);
            let incremento = Number(txtn3.value);
            let res = document.getElementById("resultado")
            while(inicio <= termina){
                res.innerHTML += `${inicio} ->`
                inicio += incremento
            }
            res.innerHTML += "FIM"

        }
    </script>
</body>
</html>
