<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 34</title>
</head>
<body>
    <h1>Exercício 34</h1>
    <span id="textoOrientacao">Digite o 1° número:</span>
    <input type="number" id="numInput">
    <button onclick="adicionarNumero()" id="btnAdicionar">Adicionar</button>
    <div id="resultado"></div>
    <script>
        let s = 0;
        let somapar = 0;
        let somaimpar = 0;
        let pares = 0;
        let impares = 0;
        let contador = 1;
        function adicionarNumero(){
            let txtn = document.getElementById("numInput");
            let res = document.getElementById("resultado");
            let orientacao = document.getElementById("textoOrientacao")
            let botao = document.getElementById("btnAdicionar");
            if(txtn.value.length === 0){
                alert("Por favor, digite um número.");
                return;
            }

            let n = Number(txtn.value);
            while(contador <= 5){
                s += n
                if(n % 2 === 0){
                    somapar += n;
                    pares++
                }else {
                    somaimpar += n;
                    impares++
                }
                let mediapar = somapar / pares
                let mediaimpar = somaimpar / impares
                res.innerHTML += `Número ${contador} digitado: <strong>${n}</strong><br>`;
                contador++
                if(contador <= 5){
                    orientacao.innerHTML = `Digite o ${contador}° número`
                }else{
                    orientacao.innerHTML = "Contagem finalizada";
                    res.innerHTML += `<br><stromg>A soma dos pares é: ${somapar}.E a média dos pares é de ${mediapar.toFixed(2)}.E foram digitados ${pares} números pares</strong>`
                        res.innerHTML += `<br><stromg>A soma dos ímpares é: ${somaimpar}.E a média dos ímpares é de ${mediaimpar.toFixed(2)}.E foram digitados ${impares} números ímpares </strong>`
                            res.innerHTML += `<br><stromg>Todos os valores digitados tem a soma de ${s}</strong>`
                }

                break
            }

            txtn.value = "";
            txtn.focus();
        }
    </script>

</body>
</html>
