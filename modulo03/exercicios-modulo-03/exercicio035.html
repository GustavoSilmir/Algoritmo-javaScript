<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 35</title>
</head>
<body>
    <h1>Exercício 35</h1>
    <span id="textoOrientacao">Quantas Pessoas vamos cadastar?</span>
    <input type="number" id="numInput"><br><br>
    <span>Qual o peso de referência?</span>
    <input type="number" id="pesoreferencia"><br><br>
    
    <button onclick="adicionarNumero()" id="btnAdicionar">Adicionar</button>
    <div id="resultado"></div>
    <script>
        let sexo = "";
        let peso = 0;
        let homens = 0;
        let mulheres = 0;
        let contador = 1;
        let homensacima = 0;
        let mulheresacima = 0;
        
        function adicionarNumero(){
            let txtn = document.getElementById("numInput");
            let res = document.getElementById("resultado");
            let txtn2 = document.getElementById("pesoreferencia")
            if(txtn.value.length === 0){
                alert("Por favor digite um valor.")
            }
            let valor = Number(txtn.value)
            let pesoreferencia = Number(txtn2.value)
            res.innerHTML = `<h3>Histórico de Cadastro:</h3>`
            while(contador <= valor ){
                let pesoDigitado = Number(prompt(`Digite o PESO da ${contador}° pessoa:`));
                let sexoDigitado = prompt(`Digite o SEXO da ${contador}° pessoa (M/F):`).toLowerCase().trim();

                res.innerHTML += `Pessoa ${contador}: Peso ${pesoDigitado}Kg | Sexo: ${sexoDigitado.toUpperCase()}<br>`;
                if(sexoDigitado === 'm' || sexoDigitado === 'masculino'){
                    if(pesoDigitado > pesoreferencia){
                        homensacima++
                    }
                    homens++
                }else if (sexoDigitado === 'f' || sexoDigitado === 'feminino'){
                    if(pesoDigitado > pesoreferencia){
                        mulheresacima++
                    }
                    mulheres++;
                }

                contador++
            }

             res.innerHTML += `<br><strong>Cadastro concluído!</strong><br>`;
            res.innerHTML += `Total de Homens: ${homens} | Total de Mulheres: ${mulheres}<br>`;
             res.innerHTML += `Total de Homens acima do peso: ${homensacima} | Total de Mulheres acima do peso: ${mulheresacima}`;
            // Limpa o input inicial
            txtn.value = "";
            
        }
    </script>
</body>
</html>
