<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 38</title>
</head>
<body>
    <h1>Exercício 38</h1>
    <h2>Cadastro de 5 pessoas</h2>
    <h3>Exibir mulher e homem mais velhos e mais novos com nomes e idades</h3>
    <span>Cadastro empresa Silmir</span>
    <button onclick="cadastroPessoas()">Cadastrar</button>
    <div id="resultado"></div>
    <script>
        let idademulhermaisnova = 0;
        let idademulhermaisvelha = 0;
        let idadehomemmaisnovo = 0;
        let idadehomemmaisvelho =0;
        let nomemulhermaisnova = "";
        let nomemulhermaisvelha = "";
        let nomehomemmaisnovo = "";
        let nomehomemmaisvelho = "";
        let totalhomens = 0;
        let totalmulheres = 0;
        let contador = 1;
        function cadastroPessoas(){
            let res = document.getElementById("resultado")
            while(contador <= 4){
                let nomeDigitado = prompt(`Digite o nome da ${contador}° pessoa `);
                let idadeDigitado = Number(prompt(`Digite a idade da ${contador}° pessoa: `));
                let sexoDigitado = prompt(`Digitado o SEXO da ${contador}° pessoa (M/F):`).toLowerCase().trim();

                res.innerHTML += `<br>${contador}° Pessoa : Nome: ${nomeDigitado} | Idade: ${idadeDigitado} | Sexo: ${sexoDigitado} <br><br>`
                if(sexoDigitado === 'm' || sexoDigitado === 'masculino'){
                    totalhomens++
                    if(totalhomens === 1){
                        idadehomemmaisnovo = idadeDigitado;
                        idadehomemmaisvelho = idadeDigitado;
                        nomehomemmaisnovo = nomeDigitado;
                        nomehomemmaisvelho = nomeDigitado;
                    }else{
                        if(idadeDigitado < idadehomemmaisnovo){
                            idadehomemmaisnovo = idadeDigitado;
                            nomehomemmaisnovo = nomeDigitado
                        }
                        if(idadeDigitado > idadehomemmaisvelho){
                            idadehomemmaisvelho = idadeDigitado;
                            nomehomemmaisvelho = nomeDigitado
                        }
                    }
                }else if(sexoDigitado === 'f' || sexoDigitado === 'feminino'){
                    totalmulheres++
                    if(totalmulheres === 1){
                        idademulhermaisnova = idadeDigitado;
                        idademulhermaisvelha = idadeDigitado;
                        nomemulhermaisnova = nomeDigitado;
                        nomemulhermaisvelha = nomeDigitado;
                    }else{
                        if(idadeDigitado < idademulhermaisnova){
                            idademulhermaisnova = idadeDigitado;
                            nomemulhermaisnova = nomeDigitado
                        }
                        if(idadeDigitado > idademulhermaisvelha){
                            idademulhermaisvelha = idadeDigitado;
                            nomemulhermaisvelha = nomeDigitado
                        }
                    }
                }
                contador++
            }

            
            res.innerHTML += `<br><strong>Cadastro concluído!</strong><br>`;
            res.innerHTML += `<br>Homem mais novo cadastro é o ${nomehomemmaisnovo} com idade de ${idadehomemmaisnovo}.<br>`
            res.innerHTML += `<br>Homem mais velho cadastro é o ${nomehomemmaisvelho} com idade de ${idadehomemmaisvelho}.<br>`
            
            res.innerHTML += `<br>Mulher mais nova cadastro é o ${nomemulhermaisnova} com idade de ${idademulhermaisnova}.<br>`
             res.innerHTML += `<br>Mulher mais velha cadastro é o ${nomemulhermaisvelha} com idade de ${idademulhermaisvelha}.<br>`
            
        }
    </script>
</body>
</html>
